services:
  webserver:
    image: nginx:alpine
    container_name: nextsi-nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ping > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  app:
    build: .
    container_name: nextsi-app
    restart: always
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-nextsi_auth}
      DB_USER: ${DB_USER:-nextsi_user}
      DB_PASSWORD: ${DB_PASSWORD:-nextsi_password}
      JWT_SECRET: ${JWT_SECRET:-nextsi_chave_dev}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-7200}
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  mysql:
    image: mysql:8.0
    container_name: nextsi-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nextsi_auth}
      MYSQL_USER: ${MYSQL_USER:-nextsi_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-nextsi_password}
    ports:
      - "3306:3306"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mysql_data: